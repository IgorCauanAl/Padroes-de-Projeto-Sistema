services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: Y
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-YourStrong!Passw0rd}
      DB_NAME: ${DB_NAME:-nobreza_loja}
    command: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd -C -S sqlserver -U sa -P \"$$DB_PASSWORD\" -Q \"IF DB_ID('$$DB_NAME') IS NULL CREATE DATABASE [$$DB_NAME];\";
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:sqlserver://sqlserver:1433;databaseName=${DB_NAME:-nobreza_loja};encrypt=true;trustServerCertificate=true
      DB_USER: sa
      DB_PASSWORD: ${DB_PASSWORD:-YourStrong!Passw0rd}
      EMAIL_REMETENTE: ${EMAIL_REMETENTE:-}
      EMAIL_SENHA: ${EMAIL_SENHA:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  sqlserver-data:

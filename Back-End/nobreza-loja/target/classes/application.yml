server:
  port: 8081

error:
  whitelabel:
    enabled: false

spring:
  datasource:
      url: jdbc:sqlserver://192.168.2.100:1433;databaseName=NobrezaDB;encrypt=false;trustServerCertificate=false
      username: sa
      password: 1234567
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 20MB
      file-size-threshold: 1MB
      location: ${java.io.tmpdir:/tmp}


  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
        envers:
          audit_table_suffix: _AUD
          store_data_at_delete: true
    show-sql: true

  devtools:
    restart:
      enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_REMETENTE}
    password: ${EMAIL_SENHA}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.2:3b
        options:
          temperature: 0.7
